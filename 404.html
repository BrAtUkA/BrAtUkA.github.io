<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<meta name="color-scheme" content="dark" />
<title>404 — BrAtUkA</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" href="/img/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--red:#ff3a4e;--chroma:#46e0e0;--ink:#ecebe9;--dim:#8a8b90;--bg:#08090b}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"JetBrains Mono",ui-monospace,monospace;
    display:grid;place-items:center;text-align:center;padding:28px;overflow:hidden;position:relative;
    background-image:radial-gradient(120% 90% at 50% 8%, #170a11, #06070a 72%);}
  .glow{position:fixed;border-radius:50%;pointer-events:none;mix-blend-mode:screen}
  .g1{width:95vw;height:95vw;left:-28vw;top:-32vh;background:radial-gradient(circle,rgba(255,58,78,.26),transparent 60%);
    animation:drift1 20s ease-in-out infinite alternate}
  .g2{width:80vw;height:80vw;right:-26vw;bottom:-30vh;background:radial-gradient(circle,rgba(210,52,72,.22),transparent 62%);
    animation:drift2 26s ease-in-out infinite alternate}
  .scan{position:fixed;inset:0;pointer-events:none;opacity:.14;
    background:repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,.22) 3px 4px)}
  .vig{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(130% 105% at 50% 46%, transparent 54%, rgba(0,0,0,.72))}
  .wrap{position:relative;z-index:2;max-width:560px}
  .kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--red);margin:0 0 24px}
  .kicker i{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:10px;vertical-align:middle}
  .code{font-family:"Chakra Petch","Arial Narrow",system-ui,sans-serif;font-weight:700;
    font-size:clamp(100px,27vw,230px);line-height:.86;letter-spacing:.01em;margin:0;color:#fff;
    text-shadow:3px 0 var(--red), -3px 0 var(--chroma)}
  h1{font-family:"Chakra Petch",system-ui,sans-serif;font-weight:600;font-size:clamp(18px,3vw,26px);
    letter-spacing:.04em;margin:22px 0 12px;color:var(--ink)}
  p.msg{color:var(--dim);font-size:14px;line-height:1.65;margin:0 0 32px}
  a.home{display:inline-flex;align-items:center;gap:10px;color:#fff;text-decoration:none;
    font-family:"Chakra Petch",system-ui,sans-serif;font-weight:600;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;background:var(--red);border:1px solid var(--red);border-radius:10px;padding:14px 28px;
    transition:box-shadow .25s ease, transform .1s ease}
  a.home:hover{box-shadow:0 0 28px rgba(255,58,78,.5)}
  a.home:active{transform:scale(.97)}
  @keyframes drift1{from{transform:translate(0,0) scale(1)} to{transform:translate(14vw,10vh) scale(1.25)}}
  @keyframes drift2{from{transform:translate(0,0) scale(1.05)} to{transform:translate(-12vw,-8vh) scale(1.3)}}
  @media (prefers-reduced-motion:no-preference){
    .code{animation:glitch 4s steps(1) infinite}
    @keyframes glitch{
      0%,90%,100%{text-shadow:3px 0 var(--red), -3px 0 var(--chroma); transform:translateX(0)}
      92%{text-shadow:-6px 0 var(--red), 6px 0 var(--chroma); transform:translateX(3px)}
      94%{text-shadow:7px 0 var(--red), -7px 0 var(--chroma); transform:translateX(-3px)}
      96%{text-shadow:-4px 0 var(--red), 4px 0 var(--chroma); transform:translateX(2px)}
    }
  }
  @media (prefers-reduced-motion:reduce){ .g1,.g2{animation:none} }
</style>
</head>
<body>
  <span class="glow g1"></span><span class="glow g2"></span>
  <span class="scan"></span><span class="vig"></span>
  <main class="wrap">
    <p class="kicker"><i></i> ERROR · 404 · SIGNAL LOST</p>
    <p class="code">404</p>
    <h1>Lost in the void</h1>
    <p class="msg">This page slipped through a crack in the fluid — there's nothing here. Let's get you back to solid ground.</p>
    <a class="home" href="/">↤&nbsp;&nbsp;Back home</a>
  </main>
</body>
</html>
